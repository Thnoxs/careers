<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocol | Thnoxs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="shortcut icon" href="image/favicon.png" type="image/x-icon">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Inter", -apple-system, sans-serif;
        background-color: #f8fafc;
      }

      /* Custom Scrollbar for minimal look */
      .custom-scroll::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      /* Clean Flat Checkbox (No 3D) */
      .minimal-checkbox {
        appearance: none;
        background-color: #fff;
        margin: 0;
        width: 20px;
        height: 20px;
        border: 1.5px solid #cbd5e1;
        border-radius: 4px;
        display: grid;
        place-content: center;
        transition: all 0.15s ease-in-out;
        cursor: pointer;
        flex-shrink: 0;
      }
      .minimal-checkbox::before {
        content: "\f00c";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        font-size: 10px;
        color: white;
        transform: scale(0);
        transition: 100ms transform ease-in-out;
      }
      .minimal-checkbox:checked {
        background-color: #0f172a;
        border-color: #0f172a;
      }
      .minimal-checkbox:checked::before {
        transform: scale(1);
      }
    </style>
  </head>
  <body class="text-slate-800 antialiased h-screen overflow-hidden flex">
    
    <aside class="w-80 bg-white border-r border-slate-200 flex flex-col h-full z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)] shrink-0">
      
      <div class="p-6 border-b border-slate-100 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-slate-200 border border-slate-300 rounded-full flex items-center justify-center text-white font-bold text-sm tracking-widest  shrink-0">
           <img src="image/favicon.png" class="w-full h-full object-cover rounded-full" alt="Favicon">
          </div>
          <div>
            <h1 class="font-bold text-sm tracking-tight text-slate-900 leading-none">Protocol</h1>
          </div>
        </div>
        <a href="https://github.com/thnoxs" target="_blank" class="text-slate-400 hover:text-slate-900 transition-colors">
          <i class="fa-brands fa-github text-lg"></i>
        </a>
      </div>

      <div class="p-6 flex-grow flex flex-col overflow-y-auto custom-scroll">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Progress Overview</h3>

        <div class="relative w-full max-w-[180px] mx-auto mb-8">
          <canvas id="progressChart"></canvas>
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <i class="fa-solid fa-trophy text-xl text-slate-200"></i>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-3 border-t border-slate-100 pt-6">
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center">
            <div>
              <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-0.5"><i class="fa-solid fa-code mr-1"></i> Tech Days</p>
              <p class="text-xs text-slate-400">MERN, Next.js</p>
            </div>
            <p id="tech-count" class="text-lg font-bold text-slate-900">0/366</p>
          </div>
          
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center">
            <div>
              <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-0.5"><i class="fa-solid fa-atom mr-1"></i> PCM Days</p>
              <p class="text-xs text-slate-400">JEE Prep</p>
            </div>
            <p id="pcm-count" class="text-lg font-bold text-slate-900">0/366</p>
          </div>
        </div>
      </div>

      <div class="p-5 border-t border-slate-100 bg-slate-50/50">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center text-slate-500 overflow-hidden shrink-0">
             <img src="image/image.png" alt="" class="w-full h-full object-cover rounded-full">
          </div>
          <div class="overflow-hidden">
            <p class="text-sm font-bold text-slate-900 truncate">Ankit Jaiswal</p>
            <p class="text-[11px] text-slate-500 truncate mt-0.5">Thnoxs@gmail.com</p>
            <p class="text-[10px] text-slate-400 mt-0.5"><i class="fa-solid fa-location-dot mr-1"></i> HSR, Bangalore</p>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto custom-scroll bg-[#f8fafc]">
      <div class="max-w-6xl mx-auto p-6 lg:p-10 flex flex-col gap-8">
        
        <header class="flex justify-between items-end">
          <div>
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">The Grind Workspace</h2>
            <p class="text-sm text-slate-500 mt-1">Consistency is the only metric that matters.</p>
          </div>
          <span class="text-xs font-semibold text-slate-500 bg-white border border-slate-200 px-3 py-1.5 rounded-md shadow-sm">
            <i class="fa-regular fa-calendar-check mr-1"></i> April 3, 2027
          </span>
        </header>

        <section class="bg-white rounded-xl p-6 border border-slate-200 shadow-sm">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wide">Activity Heatmap</h3>
            <div class="flex gap-3 text-[10px] font-bold uppercase tracking-wider text-slate-400">
              <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-sm bg-slate-100 border border-slate-200"></div> Missed</div>
              <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-sm bg-green-400"></div> Half</div>
              <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-sm bg-green-700"></div> Crushed</div>
            </div>
          </div>
          <div id="heatmap-container" class="grid grid-rows-7 grid-flow-col gap-[3px] overflow-x-auto custom-scroll pb-2"></div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
          
          <section class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-[55vh]">
            <div class="p-4 border-b border-slate-100 bg-slate-50/80 rounded-t-xl shrink-0">
              <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wide"><i class="fa-solid fa-laptop-code text-sky-500 mr-2"></i>Tech & Builds</h2>
            </div>
            <div id="tech-list" class="p-3 overflow-y-auto custom-scroll flex-grow space-y-1"></div>
          </section>

          <section class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-[55vh]">
            <div class="p-4 border-b border-slate-100 bg-slate-50/80 rounded-t-xl shrink-0">
              <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wide"><i class="fa-solid fa-atom text-sky-500 mr-2"></i>Academics</h2>
            </div>
            <div id="pcm-list" class="p-3 overflow-y-auto custom-scroll flex-grow space-y-1"></div>
          </section>

        </div>
      </div>
    </main>

    <script>
      const totalDays = 366;

      // Initialize Chart.js
      const ctx = document.getElementById("progressChart").getContext("2d");
      const progressChart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: ["Tech", "PCM", "Pending"],
          datasets: [{
            data: [0, 0, totalDays * 2],
            backgroundColor: ["#0f172a", "#64748b", "#f1f5f9"],
            borderWidth: 0,
            hoverOffset: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          cutout: "82%",
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          animation: { animateScale: true, duration: 800 },
        },
      });

      // Initialize Heatmap Grid
      function initHeatmap() {
        const container = document.getElementById("heatmap-container");
        let heatmapHTML = "";
        for (let i = 1; i <= totalDays; i++) {
          heatmapHTML += `<div id="heat-${i}" class="w-3 h-3 rounded-[2px] bg-slate-100 border border-slate-200 transition-colors duration-200" title="Day ${i}"></div>`;
        }
        container.innerHTML = heatmapHTML;
      }

      // Generate Dates List
      function generateDateList() {
        const techContainer = document.getElementById("tech-list");
        const pcmContainer = document.getElementById("pcm-list");
        const startDate = new Date("2026-04-03");
        const endDate = new Date("2027-04-03");

        let techHTML = "";
        let pcmHTML = "";
        let currentDate = new Date(startDate);
        let dayCount = 1;

        while (currentDate <= endDate) {
          const options = { weekday: "short", month: "short", day: "numeric" };
          const formattedDate = currentDate.toLocaleDateString("en-US", options);

          const itemTemplate = (type, id) => `
            <label class="flex items-center gap-4 p-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors group">
              <input type="checkbox" id="${type}-check-${id}" class="minimal-checkbox" onchange="updateStats()">
              <div class="flex-grow flex justify-between items-center">
                <p class="text-slate-800 font-medium text-sm group-hover:text-black transition-colors">${formattedDate}</p>
                <p class="text-[10px] text-slate-400 font-mono tracking-wider">DAY ${id}</p>
              </div>
            </label>
          `;

          techHTML += itemTemplate("tech", dayCount);
          pcmHTML += itemTemplate("pcm", dayCount);

          currentDate.setDate(currentDate.getDate() + 1);
          dayCount++;
        }

        techContainer.innerHTML = techHTML;
        pcmContainer.innerHTML = pcmHTML;
      }

      // Master Update Function
      function updateStats() {
        let techCompleted = 0;
        let pcmCompleted = 0;

        for (let i = 1; i <= totalDays; i++) {
          const techBox = document.getElementById(`tech-check-${i}`);
          const pcmBox = document.getElementById(`pcm-check-${i}`);
          const heatSquare = document.getElementById(`heat-${i}`);

          let dayScore = 0;
          if (techBox && techBox.checked) { dayScore++; techCompleted++; }
          if (pcmBox && pcmBox.checked) { dayScore++; pcmCompleted++; }

          if (dayScore === 0) {
            heatSquare.className = "w-3 h-3 rounded-[2px] bg-slate-100 border border-slate-200 transition-colors duration-200";
          } else if (dayScore === 1) {
            heatSquare.className = "w-3 h-3 rounded-[2px] bg-green-400 border border-green-500 transition-colors duration-200";
          } else if (dayScore === 2) {
            heatSquare.className = "w-3 h-3 rounded-[2px] bg-green-700 border border-green-800 transition-colors duration-200";
          }
        }

        const remaining = (totalDays * 2) - (techCompleted + pcmCompleted);
        progressChart.data.datasets[0].data = [techCompleted, pcmCompleted, remaining];
        progressChart.update();

        document.getElementById("tech-count").innerText = `${techCompleted}/${totalDays}`;
        document.getElementById("pcm-count").innerText = `${pcmCompleted}/${totalDays}`;
      }

      window.onload = () => {
        initHeatmap();
        generateDateList();
      };
    </script>
  </body>
</html>
