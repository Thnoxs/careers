<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocol | Thnoxs</title>
    <meta name="title" content="Protocol | The Grind Workspace" />
    <meta
      name="description"
      content="Consistency is the only metric that matters. Track your Tech & Builds and Academics progress."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thnoxs.in/" />
    <meta property="og:title" content="Protocol | The Grind Workspace" />
    <meta
      property="og:description"
      content="Consistency is the only metric that matters. Track your Tech & Builds and Academics progress."
    />
    <meta property="og:image" content="https://thnoxs.in/og-image.png" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thnoxs.in/" />
    <meta property="twitter:title" content="Protocol | The Grind Workspace" />
    <meta
      property="twitter:description"
      content="Consistency is the only metric that matters. Track your Tech & Builds and Academics progress."
    />
    <meta property="twitter:image" content="https://thnoxs.in/og-image.png" />

    <meta
      name="keywords"
      content="Protocol, Thnoxs, Tech, Builds, Academics, JEE Prep, MERN, Next.js, Consistency Tracker"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Ankit Jaiswal" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="image/favicon.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

  </head>
  <body
    class="text-slate-800 antialiased h-screen overflow-hidden flex flex-col lg:flex-row"
  >
    <audio
      id="tick-sound"
      src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
      preload="auto"
    ></audio>

    <div
      class="lg:hidden bg-white border-b p-4 flex justify-between items-center z-30"
    >
      <div class="flex items-center gap-2">
        <img
          src="image/favicon.png"
          class="w-6 h-6 rounded-full"
          alt="Favicon"
        />
        <span class="font-bold text-sm">Protocol</span>
      </div>
      <button onclick="toggleSidebar()" class="text-slate-600">
        <i class="fa-solid fa-bars text-xl"></i>
      </button>
    </div>

    <aside
      id="sidebar"
      class="bg-white border-r border-slate-200 flex flex-col h-full z-40 shadow-[.25rem_0_1.5rem_rgba(0,0,0,0.02)] shrink-0 w-80"
    >
      <div
        class="p-6 border-b border-slate-100 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 bg-slate-200 border border-slate-300 rounded-full flex items-center justify-center overflow-hidden shrink-0"
          >
            <img
              src="image/favicon.png"
              class="w-full h-full object-cover"
              alt="Favicon"
            />
          </div>
          <h1
            class="font-bold text-sm tracking-tight text-slate-900 leading-none"
          >
            Protocol
          </h1>
        </div>
        <a
          href="https://github.com/thnoxs"
          target="_blank"
          class="text-slate-400 hover:text-slate-900 transition-colors"
        >
          <i class="fa-brands fa-github text-lg"></i>
        </a>
      </div>

      <div class="p-6 flex-grow flex flex-col overflow-y-auto custom-scroll">
        <h3
          class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6"
        >
          Progress Overview
        </h3>
        <div class="relative w-full max-w-[11.25rem] mx-auto mb-8">
          <canvas id="progressChart"></canvas>
          <div
            class="absolute inset-0 flex items-center justify-center pointer-events-none"
          >
            <i class="fa-solid fa-trophy text-xl text-slate-200"></i>
          </div>
        </div>
        <div class="grid grid-cols-1 gap-3 border-t border-slate-100 pt-6">
          <div
            class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center"
          >
            <div>
              <p
                class="text-[.625rem] text-slate-500 font-bold uppercase tracking-wider mb-0.5"
              >
                <i class="fa-solid fa-code mr-1"></i> Tech Days
              </p>
              <p class="text-xs text-slate-400">MERN, Next.js</p>
            </div>
            <p id="tech-count" class="text-lg font-bold text-slate-900">
              0/366
            </p>
          </div>
          <div
            class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center"
          >
            <div>
              <p
                class="text-[.625rem] text-slate-500 font-bold uppercase tracking-wider mb-0.5"
              >
                <i class="fa-solid fa-atom mr-1"></i> PCM Days
              </p>
              <p class="text-xs text-slate-400">JEE Prep</p>
            </div>
            <p id="pcm-count" class="text-lg font-bold text-slate-900">0/366</p>
          </div>
        </div>
      </div>

      <div class="p-5 border-t border-slate-100 bg-slate-50/50">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center overflow-hidden shrink-0"
          >
            <img
              src="image/image.png"
              alt=""
              class="w-full h-full object-cover"
            />
          </div>
          <div class="overflow-hidden">
            <p class="text-sm font-bold text-slate-900 truncate">
              Ankit Jaiswal
            </p>
            <p class="text-[.6875rem] text-slate-500 truncate mt-0.5">
              Thnoxs@gmail.com
            </p>
            <p class="text-[.625rem] text-slate-400 mt-0.5">
              <i class="fa-solid fa-location-dot mr-1"></i> Lauriya, Bihar
            </p>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto custom-scroll bg-[#f8fafc] w-full">
      <div class="max-w-6xl mx-auto p-6 lg:p-10 flex flex-col gap-8">
        <header class="flex justify-between items-end flex-wrap gap-4">
          <div>
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">
              The Grind Workspace
            </h2>
            <p class="text-sm text-slate-500 mt-1">
              Consistency is the only metric that matters.
            </p>
          </div>
          <span
            class="text-xs font-semibold text-slate-500 bg-white border border-slate-200 px-3 py-1.5 rounded-md shadow-sm"
          >
            <i class="fa-regular fa-calendar-check mr-1"></i> April 3, 2026
          </span>
        </header>

        <section
          class="bg-white rounded-xl p-6 border border-slate-200 shadow-sm"
        >
          <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <h3
              class="text-sm font-bold text-slate-900 uppercase tracking-wide"
            >
              Activity Heatmap
            </h3>
            <div
              class="flex gap-3 text-[.625rem] font-bold uppercase tracking-wider text-slate-400"
            >
              <div class="flex items-center gap-1.5">
                <div
                  class="w-2.5 h-2.5 rounded-sm bg-slate-100 border border-slate-200"
                ></div>
                Missed
              </div>
              <div class="flex items-center gap-1.5">
                <div class="w-2.5 h-2.5 rounded-sm bg-green-400"></div>
                Half
              </div>
              <div class="flex items-center gap-1.5">
                <div class="w-2.5 h-2.5 rounded-sm bg-green-700"></div>
                Crushed
              </div>
            </div>
          </div>
          <div
            id="heatmap-container"
            class="grid grid-rows-7 grid-flow-col gap-[.1875rem] overflow-x-auto custom-scroll pb-2"
          ></div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
          <section
            class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-[50vh] lg:h-[55vh]"
          >
            <div
              class="p-4 border-b border-slate-100 bg-slate-50/80 rounded-t-xl shrink-0"
            >
              <h2
                class="text-sm font-bold text-slate-900 uppercase tracking-wide"
              >
                <i class="fa-solid fa-laptop-code text-sky-500 mr-2"></i>Tech &
                Builds
              </h2>
            </div>
            <div
              id="tech-list"
              class="p-3 overflow-y-auto custom-scroll flex-grow space-y-1"
            ></div>
          </section>

          <section
            class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-[50vh] lg:h-[55vh]"
          >
            <div
              class="p-4 border-b border-slate-100 bg-slate-50/80 rounded-t-xl shrink-0"
            >
              <h2
                class="text-sm font-bold text-slate-900 uppercase tracking-wide"
              >
                <i class="fa-solid fa-atom text-sky-500 mr-2"></i>Academics
              </h2>
            </div>
            <div
              id="pcm-list"
              class="p-3 overflow-y-auto custom-scroll flex-grow space-y-1"
            ></div>
          </section>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
